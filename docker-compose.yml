services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - 8096:8096
    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./data/media:/media
    environment:
      - JELLYFIN_PublishedServerUrl=https://watch.dhanrajparekh.com
    networks:
      - dhanflix

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    ports:
      - 127.0.0.1:8080:8080
    volumes:
      - ./qbittorrent-config:/config
      - ./data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Dubai
      - WEBUI_PORT=8080
    networks:
      - dhanflix

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    ports:
      - 127.0.0.1:9696:9696
    volumes:
      - ./prowlarr-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Dubai
    networks:
      - dhanflix

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    ports:
      - 127.0.0.1:7878:7878
    volumes:
      - ./radarr-config:/config
      - ./data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Dubai
    networks:
      - dhanflix

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    ports:
      - 127.0.0.1:8989:8989
    volumes:
      - ./sonarr-config:/config
      - ./data:/data
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Dubai
    networks:
      - dhanflix

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    ports:
      - 127.0.0.1:5055:5055
    volumes:
      - ./jellyseerr-config:/app/config
    environment:
      - TZ=Asia/Dubai
    networks:
      - dhanflix

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - jellyfin
    networks:
      - dhanflix

networks:
  dhanflix:
    driver: bridge
